<mat-toolbar>
  <span>
   <mat-icon fontIcon="toys"/>
   <strong>ToyApp </strong>
  </span>
  <span class="spacer"></span>
   <a routerLink="/" matButton>
    <mat-icon fontIcon="home"/>Home</a>
    <a routerLink="/" matButton>
      <mat-icon fontIcon="info"/>About</a>
      @if (authService.getActiveUser()) {
            <a routerLink="/user" matButton>
      <mat-icon fontIcon="admin_panel_settings"/>Acount
    </a>
    <button matButton (click)="doLogout()">
      <mat-icon fontIcon="logout"/>Logout
    </button>
      }@else {
         <a routerLink="/login" matButton>
      <mat-icon fontIcon="login"/>Login</a>
      }
