<mat-toolbar color="primary">
  <span>
    <mat-icon fontIcon="toys"/>
    <strong> ToyApp</strong>
  </span>

  <span class="spacer"></span>

  <a routerLink="/" mat-button>
    <mat-icon fontIcon="home"/> Home
  </a>
  <a routerLink="/about" mat-button>
    <mat-icon fontIcon="info"/> About
  </a>

  @if (authService.getActiveUser()) {
    <a routerLink="/cart" mat-button>
      <mat-icon fontIcon="shopping_cart"/> Cart
    </a>

    <a routerLink="/user" mat-button>
      <mat-icon fontIcon="admin_panel_settings"/> Account
    </a>

    <button mat-button (click)="doLogout()">
      <mat-icon fontIcon="logout"/> Logout
    </button>
  } @else {
    <a routerLink="/login" mat-button>
      <mat-icon fontIcon="login"/> Login
    </a>
  }
</mat-toolbar>

<div class="wrapper">
  <router-outlet />
</div>
