<mat-card class="small-card">
    <mat-card-header>
        <h1>Login</h1>
    </mat-card-header>
    
    <mat-card-content>
        <mat-form-field class="full-width">
            <mat-label>Email</mat-label>
            <input matInput type="email" [(ngModel)]="email">
        </mat-form-field>
        
        <mat-form-field class="full-width">
            <mat-label>Password</mat-label>
            <input matInput type="password" [(ngModel)]="password">
        </mat-form-field>
    </mat-card-content>

    <mat-card-actions>
        <button type="button" mat-raised-button color="primary" (click)="doLogin()">
            <mat-icon fontIcon="login"></mat-icon> Submit
        </button>

        <a routerLink="/signup" mat-button>
            <mat-icon fontIcon="person_add"></mat-icon> Signup
        </a>
    </mat-card-actions>
</mat-card>
