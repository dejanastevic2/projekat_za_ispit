<div class="container d-flex justify-content-center mt-5">
  <mat-card class="small-card">
    <mat-card-header>
      <mat-card-title><h1>Signup</h1></mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div class="form-container">
        <mat-form-field class="full-width">
          <mat-label>FirstName</mat-label>
          <input matInput [(ngModel)]="user.firstName">
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>LastName</mat-label>
          <input matInput [(ngModel)]="user.lastName">
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>phone</mat-label>
          <input matInput [(ngModel)]="user.phone">
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>adress</mat-label>
          <input matInput [(ngModel)]="user.address">
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Favorite type of toya</mat-label>
          <mat-select [(ngModel)]="user.favorites">
            @for (type of toyTypes(); track type) {
              <mat-option [value]="type">{{type}}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="user.email">
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" [(ngModel)]="user.password">
        </mat-form-field>

        <mat-form-field class="full-width">
          <mat-label>Repeat password</mat-label>
          <input matInput type="password" [(ngModel)]="repeat">
        </mat-form-field>
      </div>
    </mat-card-content>

    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="doSignup()">
        <mat-icon>how_to_reg</mat-icon> confirm
      </button>
      <a routerLink="/login" mat-button>Already have an account? Sign up</a>
    </mat-card-actions>
  </mat-card>
</div>
