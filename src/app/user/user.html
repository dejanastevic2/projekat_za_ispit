@if (favorites().length>0) {
<div class="user-wrapper">
<mat-card class="user-card">
    <mat-card-header>
        <h1>User details</h1>
    </mat-card-header>
        <mat-card-content>

            <mat-form-field class="full-width">
                <mat-label>FirstName</mat-label>
                <input matInput type="email" [(ngModel)]="activeUser!.firstName">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>LastName</mat-label>
                <input matInput type="email" [(ngModel)]="activeUser!.lastName">
            </mat-form-field>
            
        <mat-form-field class="full-width">
            <mat-label>Address</mat-label>
            <input matInput type="address" [(ngModel)]="activeUser!.address">
        </mat-form-field>
        <mat-form-field class="full-width">
            <mat-label>Phone</mat-label>
            <input matInput type="phone" [(ngModel)]="activeUser!.phone">
        </mat-form-field>
        <mat-form-field class="full-width">
        <mat-label>Favorite type of toy</mat-label>
         <mat-select [(ngModel)]="activeUser!.favorites">
            @for (favorit of favorites(); track favorit.typeId) {
        <mat-option [value]="favorit.name">
                 {{ favorit.name }}
             </mat-option>
        }
  </mat-select>
        </mat-form-field>
        
    </mat-card-content>
    <mat-card-actions>
 <button  type="button" matButton (click)="updateUser()">
            <mat-icon fontIcon="save" />Save Changes</button>
    </mat-card-actions>
</mat-card>
<div>
    <mat-card class="user-card user-details">
        <mat-card-content>
           <div class="user-info">
                <mat-card-header>
                    <h1>Acount info</h1>
                 </mat-card-header>
             <img [src]="getAvatarUrl()" class="user-image">
                <h3>{{activeUser?.email}}</h3>
           </div>
        </mat-card-content>
    <mat-card-header>
       
    </mat-card-header>
       
    </mat-card>
     <mat-card class="user-card ">
    <mat-card-header>
        <h1>Change Password</h1>
    </mat-card-header>
        <mat-card-content>
            <mat-form-field class="full-width">
                <mat-label>Old Password</mat-label>
                <input matInput type="password" [(ngModel)]="oldPassword">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>New Password</mat-label>
                <input matInput type="password" [(ngModel)]="newPassword">
            </mat-form-field>
            <mat-form-field class="full-width">
                <mat-label>Repeat Password</mat-label>
                <input matInput type="password" [(ngModel)]="repeatPassword">
            </mat-form-field>
           
       
        
             </mat-card-content>
                <mat-card-actions>
             <button  type="button" matButton (click)="updatePassword()">
                <mat-icon fontIcon="password" />Update Password</button>
         </mat-card-actions>
    </mat-card>
    </div>
</div>

} @else {
     <app-loading />
}
